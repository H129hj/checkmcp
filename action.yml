name: "CheckMCP"
description: "Audit & score an MCP server in CI — fails on a low score or a regression of the tool definitions (rug-pull)."
author: "CheckMCP"
branding:
  icon: "shield"
  color: "green"
inputs:
  url:
    description: "MCP endpoint URL (streamable-http or SSE)"
    required: true
  min-score:
    description: "Fail if the MCP Score is below this value"
    required: false
    default: "70"
  baseline:
    description: "Path to a committed baseline file -> regression detection (tool mutation/removal)"
    required: false
    default: ""
  repo:
    description: "owner/name or GitHub URL -> maintenance/license signal"
    required: false
    default: ""
  token:
    description: "Bearer token if the server requires auth"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - shell: bash
      run: pip install --quiet "${{ github.action_path }}"
    - shell: bash
      env:
        CKMCP_URL: ${{ inputs.url }}
        CKMCP_MIN: ${{ inputs.min-score }}
        CKMCP_BASELINE: ${{ inputs.baseline }}
        CKMCP_REPO: ${{ inputs.repo }}
        CKMCP_TOKEN: ${{ inputs.token }}
      run: |
        args=("$CKMCP_URL" --gh-summary --min-score "$CKMCP_MIN")
        [ -n "$CKMCP_BASELINE" ] && args+=(--baseline "$CKMCP_BASELINE")
        [ -n "$CKMCP_REPO" ] && args+=(--repo "$CKMCP_REPO")
        [ -n "$CKMCP_TOKEN" ] && args+=(--token "$CKMCP_TOKEN")
        checkmcp "${args[@]}"
