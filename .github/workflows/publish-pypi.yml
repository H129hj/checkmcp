name: publish-pypi

# Publishes the `checkmcp` package to PyPI when you publish a GitHub Release (or run manually).
# Auth: PyPI Trusted Publishing (OIDC, token-less). One-time setup on PyPI —
# https://pypi.org/manage/account/publishing/ → add a "pending publisher":
#   PyPI project name: checkmcp
#   Owner:             H129hj
#   Repository name:   checkmcp
#   Workflow name:     publish-pypi.yml
#   Environment:       (leave blank)
# No repo secret needed; `id-token: write` below supplies the OIDC identity.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # enables PyPI Trusted Publishing (the token-less option)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` — authentication is via Trusted Publishing (OIDC / id-token: write).
