name: publish-pypi

# Publishes the `checkmcp` package to PyPI when you publish a GitHub Release (or run manually).
# Setup: create a PyPI API token (https://pypi.org/manage/account/token/) and add it as the repo
# secret `PYPI_API_TOKEN`. (For the more secure option, configure PyPI Trusted Publishing instead and
# drop the `password:` line below.)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # enables PyPI Trusted Publishing (the token-less option)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
