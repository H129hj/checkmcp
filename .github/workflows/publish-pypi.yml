name: publish-pypi

# Publishes the `checkmcp` package to PyPI on a GitHub Release (or manual run).
#
# RECOMMENDED — Trusted Publishing (no token to store):
#   On PyPI → your account → Publishing → "Add a pending publisher":
#     PyPI Project Name: checkmcp | Owner: H129hj | Repository: checkmcp
#     Workflow name: publish-pypi.yml | Environment: (leave blank)
#   Then re-run this workflow — it authenticates via OIDC, no secret needed.
#
# ALTERNATIVE — API token: create an ACCOUNT-scoped token (project-scoped fails on first upload),
#   add it as repo secret `PYPI_API_TOKEN`. The `password:` line below will then be used.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
