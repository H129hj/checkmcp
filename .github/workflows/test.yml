name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .
      - name: Run tests
        run: pytest -q
      - name: Smoke-import the CLI
        run: |
          python -c "import checkmcp, checkmcp.cli, checkmcp.score, checkmcp.evals, checkmcp.monitor, checkmcp.calibrate; print('import ok', checkmcp.__version__)"
